name: vn_date_formatter
description: >-
  A Dart/Flutter package for formatting and converting dates with Vietnamese
  locale support. Provides common date patterns, conversion utilities, and
  Vietnamese weekday/relative-time labels.
version: 1.0.0
homepage: https://github.com/quangtran2003/vn_date_formatter
repository: https://github.com/quangtran2003/vn_date_formatter
issue_tracker: https://github.com/quangtran2003/vn_date_formatter/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
